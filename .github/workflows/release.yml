name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Version tag to release (for example v1.2.0)"
        required: true
        type: string
      release_name:
        description: "Optional release title"
        required: false
        type: string
      target_commitish:
        description: "Branch, tag, or commit SHA to release"
        required: false
        default: "master"
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build release artifacts
        run: mvn -B verify --file pom.xml --no-transfer-progress

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && (inputs.release_name || inputs.tag_name) || github.ref_name }}
          target_commitish: ${{ github.event_name == 'workflow_dispatch' && inputs.target_commitish || github.sha }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          generate_release_notes: true
          append_body: true
          files: |
            target/*.jar
          fail_on_unmatched_files: true
